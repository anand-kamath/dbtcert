version: 2
snapshots:
  - name: hst_airports
    description: "This snapshot captures the historical changes in the airports data from the airstats project."
    relation: ref('int_airports')
    config:
      database: "airstats"
      schema: "silver_hst"
      unique_key: "aiport_ident"
      strategy: "check"
      check_cols: ["airport_name", "airport_type", "airport_lat", "airport_long", "continent", "iso_country", "iso_region"]
      snapshot_meta_column_names:
        {"dbt_valid_from": "valid_from",
        "dbt_valid_to": "valid_to"}
      dbt_valid_to_current: to_timestamp('9999-12-31 23:59:59')
      meta:
        owner: "Ayansh Kamath"
        created_at: "2024-06-13"