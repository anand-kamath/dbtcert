version: 2
snapshots:
  - name: hst_runways
    relation: ref('int_runways')
    description: "This snapshot captures the historical changes in the runways data from the airstats project."
    config:
      database: "airstats"
      schema: "silver_hst"
      unique_key: "runway_id"
      strategy: "check"
      check_cols: ["runway_length_ft", "runway_width_ft", "runway_surface", "runway_lighted", "runway_closed"]
      snapshot_meta_column_names:
        {"dbt_valid_from": "valid_from",
        "dbt_valid_to": "valid_to"}
      dbt_valid_to_current: to_timestamp('9999-12-31 23:59:59')
      meta:
        owner: "Gayathri Kamath"
        created_at: "2024-06-13"